services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: apva
      POSTGRES_PASSWORD: apva
      POSTGRES_DB: apva
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apva -d apva"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - .env.example
    environment:
      APVA_DATABASE_URL: postgresql+asyncpg://apva:apva@postgres:5432/apva
      APVA_REDIS_URL: ${APVA_REDIS_URL:-redis://redis:6379/0}
      APVA_CELERY_BROKER_URL: redis://redis:6379/0
      APVA_CELERY_RESULT_BACKEND: redis://redis:6379/1
      APVA_TARGET_APP_URL: http://mock-target:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-target:
        condition: service_started
    command: >
      bash -c "/app/apps/backend/scripts/wait-for-it.sh postgres 5432 60 &&
               /app/apps/backend/scripts/wait-for-it.sh redis 6379 60 &&
               uvicorn apps.backend.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  celery-worker:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - .env.example
    environment:
      APVA_DATABASE_URL: postgresql+asyncpg://apva:apva@postgres:5432/apva
      APVA_REDIS_URL: ${APVA_REDIS_URL:-redis://redis:6379/0}
      APVA_CELERY_BROKER_URL: redis://redis:6379/0
      APVA_CELERY_RESULT_BACKEND: redis://redis:6379/1
      APVA_TARGET_APP_URL: http://mock-target:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-target:
        condition: service_started
    command: >
      bash -c "/app/apps/backend/scripts/wait-for-it.sh postgres 5432 60 &&
               /app/apps/backend/scripts/wait-for-it.sh redis 6379 60 &&
               celery -A apps.backend.worker.celery_app worker --loglevel=INFO --concurrency=2"

  mock-target:
    build:
      context: .
      dockerfile: apps/mock_target/Dockerfile
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
