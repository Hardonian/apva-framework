[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "apva-cli"
version = "2.0.0"
description = "CLI eval runner for APVA"
requires-python = ">=3.10"
dependencies = [
  "httpx>=0.28.1,<1.0",
  "pydantic>=2.12.0,<3.0"
]

[project.scripts]
apva = "apva_cli.main:main"

[tool.setuptools.packages.find]
where = ["src"]
