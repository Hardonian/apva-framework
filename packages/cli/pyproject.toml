[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "apva-cli"
version = "2.0.0"
description = "CLI eval runner for APVA"
requires-python = ">=3.10"
dependencies = [
  "httpx==0.28.1",
  "pydantic==2.10.4"
]

[project.scripts]
apva = "apva_cli.main:main"

[tool.setuptools.packages.find]
where = ["src"]
