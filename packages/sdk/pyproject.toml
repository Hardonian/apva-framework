[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "apva-sdk"
version = "2.0.0"
description = "Async telemetry SDK for APVA enterprise backend"
requires-python = ">=3.10"
dependencies = [
  "httpx==0.28.1",
  "pydantic==2.10.4"
]

[tool.setuptools.packages.find]
where = ["src"]
